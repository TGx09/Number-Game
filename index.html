<!DOCTYPE html>
<html>
<head>
    <title>Number Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="content">

    <h3>Guess the number:</h3>

    <input type="radio" name="n" id="w1">
    <input type="radio" name="n" id="w2">
    <input type="radio" name="n" id="w3">
    <input type="radio" name="n" id="correct">

    <label for="w1">1</label>
    <label for="w2">2</label>
    <label for="w3">3</label>
    <label for="correct">4</label>

    <p class="wrong">Wrong! Try again.</p>
    <p class="win">You found it! It was 4.</p>
    <br><br>

    <div class="reset">
    <a href=".">Reset</a>
    </div>
    </div>
</body>
</html>
